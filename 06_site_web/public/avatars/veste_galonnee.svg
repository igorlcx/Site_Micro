<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fancy gallooned jacket body -->
  <rect x="28" y="53" width="44" height="37" rx="4" fill="#1e1b4b"/>
  <!-- Gold trim on jacket -->
  <rect x="28" y="53" width="5" height="37" fill="#92400e"/>
  <rect x="67" y="53" width="5" height="37" fill="#92400e"/>
  <!-- Gold buttons -->
  <circle cx="50" cy="60" r="2" fill="#f59e0b"/>
  <circle cx="50" cy="68" r="2" fill="#f59e0b"/>
  <circle cx="50" cy="76" r="2" fill="#f59e0b"/>
  <circle cx="50" cy="84" r="2" fill="#f59e0b"/>
  <!-- Gold epaulettes -->
  <rect x="14" y="53" width="16" height="6" rx="3" fill="#92400e"/>
  <rect x="70" y="53" width="16" height="6" rx="3" fill="#92400e"/>
  <!-- Epaulette fringe -->
  <line x1="15" y1="59" x2="15" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="18" y1="59" x2="18" y2="66" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="21" y1="59" x2="21" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="24" y1="59" x2="24" y2="66" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="70" y1="59" x2="70" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="73" y1="59" x2="73" y2="66" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="76" y1="59" x2="76" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="79" y1="59" x2="79" y2="66" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="50" cy="38" r="18" fill="#f4c28b"/>
  <circle cx="43" cy="36" r="2.5" fill="#2c1810"/>
  <circle cx="57" cy="36" r="2.5" fill="#2c1810"/>
  <circle cx="44" cy="35" r="0.8" fill="white"/>
  <circle cx="58" cy="35" r="0.8" fill="white"/>
  <path d="M43 44 Q50 49 57 44" stroke="#2c1810" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M35 50 Q50 58 65 50 Q60 55 50 57 Q40 55 35 50z" fill="#4a3728"/>
  <!-- Legs -->
  <rect x="33" y="88" width="14" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="53" y="88" width="14" height="10" rx="2" fill="#1a1a2e"/>
  <rect x="31" y="95" width="16" height="5" rx="2" fill="#3d2b1f"/>
  <rect x="51" y="95" width="16" height="5" rx="2" fill="#3d2b1f"/>
